{% extends "base.html" %}

{% block title %}Create Quiz - Quiz System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4">Create New Quiz</h2>

        <form method="POST" class="card p-4">
            <div class="mb-3">
                <label for="title" class="form-label">Quiz Title *</label>
                <input type="text" class="form-control" id="title" name="title" required>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" name="description" rows="4"></textarea>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="total_marks" class="form-label">Total Marks *</label>
                    <input type="number" class="form-control" id="total_marks" name="total_marks" min="1" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label for="time_limit" class="form-label">Time Limit (minutes) *</label>
                    <input type="number" class="form-control" id="time_limit" name="time_limit" min="1" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label for="required_questions" class="form-label">Number of Questions *</label>
                    <input type="number" class="form-control" id="required_questions" name="required_questions" min="1" placeholder="e.g., 10" required>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Create Quiz</button>
                <a href="{{ url_for('teacher.dashboard') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
